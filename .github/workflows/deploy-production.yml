name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要部署的 tag (例如 v1.2.3)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST_KEY: ${{ secrets.EC2_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "$EC2_HOST_KEY" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host aws-online
            HostName $EC2_HOST
            User $EC2_USER
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Write .env.local from secret
        env:
          ENV_LOCAL: ${{ secrets.ENV_LOCAL_PROD }}
        run: |
          if [ -z "$ENV_LOCAL" ]; then
            echo "::error::ENV_LOCAL_PROD secret is empty or missing"
            exit 1
          fi
          printf '%s\n' "$ENV_LOCAL" > .env.local
          chmod 600 .env.local

      - name: Deploy
        run: bash scripts/deploy.sh aws-online

name: Deploy to aws-preonline on PR merge to main

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure SSH for aws-preonline alias
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          cat > ~/.ssh/id_deploy <<'EOF'
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          sed -i 's/\r$//' ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          printf '%s\n' "${{ secrets.EC2_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host aws-preonline
            HostName ${{ secrets.EC2_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify SSH key format
        run: ssh-keygen -y -f ~/.ssh/id_deploy >/dev/null

      - name: Test SSH connection
        run: ssh -o BatchMode=yes aws-preonline 'echo connected'

      - name: Write .env.local from secrets
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_SYSTEM_TOKEN: ${{ secrets.META_SYSTEM_TOKEN }}
          WA_VERIFY_TOKEN: ${{ secrets.WA_VERIFY_TOKEN }}
          WA_SYSTEM_TOKEN: ${{ secrets.WA_SYSTEM_TOKEN }}
          REVO_SCM_API_KEY: ${{ secrets.REVO_SCM_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python3 .github/workflows/write_env.py

      - name: Run deploy.sh
        id: deploy
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh aws-preonline

      - name: Notify Feishu
        if: always()
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          DEPLOY_ENV: preonline
          APP_URL: http://${{ secrets.EC2_HOST }}:3002/login
          DEPLOY_STATUS: ${{ steps.deploy.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: python3 .github/workflows/notify_feishu.py
